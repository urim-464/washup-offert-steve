<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontaktformulär för fastighetstvätt – få en kostnadsfri offert från Washup AB inom 24 timmar. ROT-avdrag gäller för många tjänster.">
    <title>Offert för tvätt – Washup AB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Roboto:wght@400;525&amp;display=swap');
        
        :root {
            --primary: #0066cc;
            --primary-light: #a8d8ff;
            --accent: #27ae60;    /* grön accent för ROT‑lapp */
            --font-small: 0.85rem;
            --bg-gradient: linear-gradient(140deg, #e0f7ff 0%, #f0faff 40%, #ffffff 100%);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.5;
            color: #333;
            background: var(--bg-gradient);
            font-size: 15px;
        }
        
        .container {
            max-width: 680px;
            margin: 14px auto;
            padding: 1rem;
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #d0e6ff;
        }
        
        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
            color: #0055aa;
        }
        
        .subhead {
            text-align: center;
            font-size: var(--font-small);
            margin-bottom: 1.4rem;
            color: #444;
        }
        
        label {
            display: block;
            margin-bottom: 2px;
            font-weight: 500;
            font-size: 0.8rem;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        input:focus,
        textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2.5px rgba(0,102,204,0.25);
        }
        
        .form-row {
            margin-bottom: 10px;
        }
        
        .services {
            margin: 14px 0 10px;
        }
        
        .services h3 {
            margin-bottom: 5px;
            font-size: 1rem;
        }
        
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
        }
        
        /* Snygg, lite färgglad checkbox */
        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 0;
        }
        
        .custom-checkbox input[type="checkbox"] {
            appearance: none;
            margin: 0;
            width: 16px;
            height: 16px;
            border: 1.8px solid #999;
            border-radius: 4px;
            background: white;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s border-color, 0.2s box-shadow;
        }
        
        .custom-checkbox input[type="checkbox"]:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,102,204,0.3);
        }
        
        .custom-checkbox input[type="checkbox"]:checked {
            border-color: var(--primary);
            background: var(--primary);
        }
        
        .custom-checkbox input[type="checkbox"]::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: white;
            opacity: 0;
            transition: 0.2s opacity;
        }
        
        .custom-checkbox input[type="checkbox"]:checked::after {
            opacity: 1;
        }
        
        .gdpr {
            background: #f8f9fa;
            padding: 5px 7px;
            border-radius: 5px;
            border: 1.4px solid #e0e0e0;
            margin: 12px 0 10px;
            font-size: 0.75rem;
            line-height: 1.3;
        }
        
        .gdpr label {
            display: flex;
            align-items: flex-start;
            gap: 5px;
            cursor: pointer;
        }
        
        .gdpr a {
            color: var(--primary);
        }
        
        .rot-notice {
            display: flex;
            justify-content: center;
            margin: 10px 0 12px;
            font-size: 0.88rem;
            color: var(--accent);
            font-weight: 600;
        }
        
        .btn-row {
            text-align: center;
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 11px 26px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 1px;
        }
        
        button:hover {
            background: #004daa;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,102,204,0.25);
        }
        
        .success {
            display: none;
            background: #d9f1e3;
            color: #155724;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kostnadsfri offert</h1>
        <p class="subhead">Fyll i formuläret nedan så kontaktar <strong>Washup AB</strong> dig inom 24 timmar.</p>
        
        <p class="rot-notice">
            ✅ ROT‑avdrag gäller för många av våra tjänster.
        </p>
        
        <form id="contactForm" onsubmit="handleSubmit(event)">
            <div class="form-row">
                <label for="name">Namn *</label>
                <input type="text" id="name" name="name" required placeholder="Anna Andersson">
            </div>
            
            <div class="form-row">
                <label for="email">E‑post *</label>
                <input type="email" id="email" name="email" required placeholder="din.email@exempel.se">
            </div>
            
            <div class="form-row">
                <label for="phone">Telefonnummer *</label>
                <input type="tel" id="phone" name="phone" required placeholder="070‑xxxx xxx">
            </div>
            
            <div class="form-row">
                <label for="address">Address / Postnr</label>
                <input type="text" id="address" name="address" placeholder="Gatunamn 12, 123 45 Ort">
            </div>
            
            <div class="form-row">
                <label for="message">Kort beskrivning</label>
                <textarea id="message" name="message" rows="3" placeholder="2‑plansvilla, tegelfasad osv"></textarea>
            </div>
            
            <div class="services">
                <h3>Vilka tjänster?</h3>
                <div class="checkbox-grid">
                    <label class="checkbox-item">
                        <span class="custom-checkbox">
                            <input type="checkbox" name="service" value="fasadtvätt">
                        </span>
                        <span>Fasadtvätt</span>
                    </label>
                    <label class="checkbox-item">
                        <span class="custom-checkbox">
                            <input type="checkbox" name="service" value="taktvätt">
                        </span>
                        <span>Taktvätt</span>
                    </label>
                    <label class="checkbox-item">
                        <span class="custom-checkbox">
                            <input type="checkbox" name="service" value="utemiljo">
                        </span>
                        <span>Utemiljö‑tvätt</span>
                    </label>
                    <label class="checkbox-item">
                        <span class="custom-checkbox">
                            <input type="checkbox" name="service" value="other">
                        </span>
                        <span>Annat (beskriv i textfältet)</span>
                    </label>
                </div>
            </div>
            
            <div class="gdpr">
                <label>
                    <span class="custom-checkbox">
                        <input type="checkbox" id="gdpr" name="gdpr" required>
                    </span>
                    <span><strong>Jag vill bli kontaktad av Washup AB</strong> och godkänner att mina uppgifter behandlas enligt <a href="https://din.sajt/integritetspolicy" target="_blank">integritetspolicy</a> och GDPR. Samtycke kan återkallas när som helst.</span>
                </label>
            </div>
            
            <div class="btn-row">
                <button type="submit">Skicka förfrågan</button>
            </div>
        </form>
        
        <div id="successMessage" class="success">
            ✅ Tack! Din förfrågan har skickats. Vi kontaktar dig inom kort.
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            
            // washup1@proton.me används i bakgrunden (backend/email)
            // fetch('/api/submit', { method: 'POST', body: new FormData(e.target) });
            
            const success = document.getElementById('successMessage');
            success.style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('contactForm').reset();
                success.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
