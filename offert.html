<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kontaktformulär för fastighetstvätt – få en kostnadsfri offert från Washup AB inom 24 timmar. ROT-avdrag gäller för många tjänster.">
    <title>Offert för tvätt – Washup AB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Roboto:wght@400;525&amp;display=swap');
        
        :root {
            --primary: #0066cc;
            --primary-light: #a8d8ff;
            --accent: #27ae60;    /* grön accent för ROT‑lapp */
            --font-small: 0.85rem;
            --bg-gradient: linear-gradient(140deg, #e0f7ff 0%, #f0faff 40%, #ffffff 100%);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.5;
            color: #333;
            background: var(--bg-gradient);
            font-size: 15px;
        }
        
        .container {
            max-width: 680px;
            margin: 14px auto;
            padding: 1rem;
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid #d0e6ff;
        }
        
        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 0.25rem;
            color: #0055aa;
        }
        
        .subhead {
            text-align: center;
            font-size: var(--font-small);
            margin-bottom: 1.4rem;
            color: #444;
        }
        
        label {
            display: block;
            margin-bottom: 2px;
            font-weight: 500;
            font-size: 0.8rem;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        input:focus,
        textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2.5px rgba(0,102,204,0.25);
        }
        
        .form-row {
            margin-bottom: 10px;
        }
        
        .services {
            margin: 14px 0 10px;
        }
        
        .services h3 {
            margin-bottom: 5px;
            font-size: 1rem;
        }
        
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
        }
        
        /* Snygg, lite färgglad checkbox */
        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 0;
        }
        
        .custom-checkbox input[type="checkbox"] {
            appearance: none;
            margin: 0;
            width: 16px;
            height: 16px;
            border: 1.8px solid #999;
            border-radius: 4px;
            background: white;
            position: relative;
            flex-shrink: 0;
            cursor: pointer;
            transition: 0.2s border-color, 0.2s box-shadow;
        }
        
        .custom-checkbox input[type="checkbox"]:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,102,204,0.3);
        }
        
        .custom-checkbox input[type="checkbox"]:checked {
            border-color: var(--primary);
            background: var(--primary);
        }
        
        .custom-checkbox input[type="checkbox"]::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: white;
            opacity: 0;
            transition: 0.2s opacity;
        }
        
        .custom-checkbox input[type="checkbox"]:checked::after {
            opacity: 1;
        }
        
        .gdpr {
            background: #f8f9fa;
            padding: 5px 7px;
            border-radius: 5px;
            border: 1.4px solid #e0e0e0;
            margin: 12px 0 10px;
            font-size: 0.75rem;
            line-height: 1.3;
                                                                                                                                                                        
            ✅ Tack! Din förfrågan har skickats. Vi kontaktar dig inom kort.
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            
            // washup1@proton.me används i bakgrunden (backend/email)
            // fetch('/api/submit', { https://formsubmit.co/washup1@proton.me });
            
            const success = document.getElementById('successMessage');
            success.style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('contactForm').reset();
                success.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
