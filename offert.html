<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Washup Offert – Tak & fasad Malmö</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      background:radial-gradient(circle at top,#4f46e5 0,#0f172a 45%,#020617 100%);
      color:#0f172a;
    }
    .card{
      width:100%;
      max-width:420px;
      padding:28px 24px 30px;
      border-radius:24px;
      background:rgba(255,255,255,0.12);
      box-shadow:0 24px 80px rgba(15,23,42,0.7);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.28);
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 10px;
      border-radius:999px;
      background:rgba(15,23,42,0.85);
      color:#e5e7eb;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:14px;
    }
    .badge span:nth-child(1){
      font-size:16px;
    }
    h1{
      font-size:22px;
      color:#f9fafb;
      margin-bottom:4px;
    }
    .sub{
      font-size:13px;
      color:#cbd5f5;
      margin-bottom:22px;
    }
    label{
      display:block;
      font-size:12px;
      font-weight:600;
      letter-spacing:.03em;
      text-transform:uppercase;
      color:#e5e7eb;
      margin-bottom:6px;
    }
    .field{
      width:100%;
      padding:11px 12px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.6);
      background:rgba(15,23,42,0.75);
      color:#e5e7eb;
      font-size:14px;
      outline:none;
      transition:border-color .18s,box-shadow .18s,background .18s,transform .12s;
    }
    .field::placeholder{color:#94a3b8}
    .field:focus{
      border-color:#38bdf8;
      box-shadow:0 0 0 1px rgba(56,189,248,0.4);
      background:rgba(15,23,42,0.92);
      transform:translateY(-1px);
    }
    .row{margin-bottom:14px;}
    .checks{
      margin:4px 0 12px;
      display:grid;
      gap:6px;
      font-size:13px;
      color:#e5e7eb;
    }
    .checks label{
      text-transform:none;
      letter-spacing:0;
      font-weight:500;
      display:flex;
      align-items:center;
      gap:7px;
      font-size:13px;
    }
    .checks input{
      accent-color:#22c55e;
      width:15px;
      height:15px;
    }
    .hint{
      font-size:11px;
      color:#9ca3af;
      margin-bottom:14px;
    }
    .cta{
      position:relative;
      margin-top:6px;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:999px;
      padding:13px 16px;
      font-size:15px;
      font-weight:700;
      color:#0b1120;
      cursor:pointer;
      background:linear-gradient(135deg,#22c55e,#a3e635);
      box-shadow:0 14px 35px rgba(34,197,94,0.5);
      transition:transform .13s,box-shadow .13s,filter .13s;
    }
    .btn:hover{
      transform:translateY(-1px) scale(1.01);
      box-shadow:0 18px 40px rgba(34,197,94,0.62);
      filter:saturate(1.05);
    }
    .btn:active{
      transform:translateY(0) scale(.99);
      box-shadow:0 10px 26px rgba(22,163,74,0.55);
    }
    .cta-note{
      text-align:center;
      font-size:11px;
      color:#9ca3af;
      margin-top:8px;
    }
    #success{
      display:none;
      margin-top:14px;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(22,163,74,0.12);
      border:1px solid rgba(22,163,74,0.7);
      color:#bbf7d0;
      font-size:13px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <span>🧽</span><span>Gratis offert inom 24h</span>
    </div>
    <h1>Washup Offert</h1>
    <p class="sub">Tak & fasad i Malmö – fyll i så återkommer vi med prisförslag.</p>

    <form id="offertForm">
      <div class="row">
        <label for="namn">Namn</label>
        <input class="field" id="namn" name="namn" type="text" placeholder="För- och efternamn" required>
      </div>

      <div class="row">
        <label for="telefon">Telefon</label>
        <input class="field" id="telefon" name="telefon" type="tel" placeholder="07x-xxx xx xx" required>
      </div>

      <div class="row">
        <label for="epost">E-post</label>
        <input class="field" id="epost" name="epost" type="email" placeholder="din@mail.se" required>
      </div>

      <div class="row">
        <label for="omrade">Område/Postnr</label>
        <input class="field" id="omrade" name="omrade" type="text" placeholder="T.ex. Limhamn 216xx" required>
      </div>

      <div class="row">
        <label>Behöver du</label>
        <div class="checks">
          <label><input type="checkbox" name="tjanst" value="Takbehandling">Takbehandling</label>
          <label><input type="checkbox" name="tjanst" value="Fasadtvätt">Fasadtvätt</label>
          <label><input type="checkbox" name="tjanst" value="Utemiljö">Rengöring utemiljö</label>
        </div>
      </div>

      <div class="row">
        <label for="storlek">Storlek</label>
        <select class="field" id="storlek" name="storlek" required>
          <option value="">Välj...</option>
          <option value="Litet hus">Litet hus (upp till 120 m²)</option>
          <option value="Mellan">Mellan (120–180 m²)</option>
          <option value="Stort">Stort (över 180 m²)</option>
        </select>
      </div>

      <p class="hint">Bifoga gärna bilder i svaret när vi kontaktar dig så kan vi ge ännu mer träffsäker offert.</p>

      <div class="cta">
        <button class="btn" type="submit">Skicka offertförfrågan</button>
        
      </div>

      <div id="success">Tack! Din förfrågan är skickad. Vi hör av oss inom 24 timmar.</div>
    </form>
  </div>

  <script>
    document.getElementById('offertForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const formData = new FormData(this);
      const data = Object.fromEntries(formData);
      data.tjanster = Array.from(formData.getAll('tjanst')).join(', ');

      await fetch('https://formspree.io/f/YOUR_FORM_ID', { // byt till ditt Formspree-ID
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          namn:data.namn,
          telefon:data.telefon,
          epost:data.epost,
          omrade:data.omrade,
          tjanster:data.tjanster,
          storlek:data.storlek,
          _subject:'Ny Washup-offertförfrågan',
          _replyto:data.epost,
          to:'washup@proton.me'
        })
      });

      document.getElementById('success').style.display='block';
      this.reset();
    });
  </script>
</body>
</html>
